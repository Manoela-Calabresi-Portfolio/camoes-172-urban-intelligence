<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">Camões 172 system overview</title>
  <desc id="desc">Data sources flow into COLD and HOT pipelines, then into PostGIS, GeoJSON analysis, Leaflet 2D viewer, MapLibre complementary scenes, and the editorial dossier for client delivery.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8E857A"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7AF9E"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; }
      .label { font: 600 18px/1.2 "Manrope", Arial, sans-serif; fill: #908a83; letter-spacing: .01em; }
      .boxTitle { font: 700 22px/1.2 "Manrope", Arial, sans-serif; fill: #3a3a36; }
      .boxSub { font: 500 14px/1.2 "Manrope", Arial, sans-serif; fill: #968f86; }
      .small { font: 600 13px/1.2 "Manrope", Arial, sans-serif; fill: #726d66; }
      .tiny { font: 500 12px/1.2 "Manrope", Arial, sans-serif; fill: #98938b; }
      .green { fill: #e8f4ee; stroke: #6fb08b; }
      .green2 { fill: #edf8f2; stroke: #80b898; }
      .lav { fill: #eef0ff; stroke: #8b8fee; }
      .orange { fill: #f8efe5; stroke: #de9d4b; }
      .grey { fill: #f4f2ec; stroke: #c5c0b7; }
      .line { stroke: #8e857a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .lineSoft { stroke: #b7af9e; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); }
      .lineDotted { stroke: #b7af9e; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowSoft); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="860" rx="28"/>

  <!-- Column labels -->
  <text class="label" x="125" y="64">Data sources</text>
  <text class="label" x="390" y="64">Processing</text>
  <text class="label" x="650" y="64">PostGIS</text>
  <text class="label" x="915" y="64">Analysis</text>
  <text class="label" x="1290" y="64">Delivery</text>

  <!-- Left column: sources -->
  <rect class="green" x="80" y="96" rx="12" ry="12" width="285" height="48"/>
  <text class="boxTitle" x="222" y="124" text-anchor="middle">GeoCuritiba</text>
  <text class="tiny" x="222" y="141" text-anchor="middle">ArcGIS REST</text>

  <rect class="green" x="80" y="154" rx="12" ry="12" width="285" height="48"/>
  <text class="boxTitle" x="222" y="182" text-anchor="middle">IBGE Censo 2022</text>
  <text class="tiny" x="222" y="199" text-anchor="middle">SIDRA API</text>

  <rect class="green" x="80" y="212" rx="12" ry="12" width="285" height="48"/>
  <text class="boxTitle" x="222" y="240" text-anchor="middle">OSM</text>
  <text class="tiny" x="222" y="257" text-anchor="middle">Overpass / osmnx</text>

  <rect class="grey" x="80" y="318" rx="12" ry="12" width="285" height="48"/>
  <text class="boxTitle" x="222" y="346" text-anchor="middle">LiDAR</text>
  <text class="tiny" x="222" y="363" text-anchor="middle">OpenTopography</text>

  <rect class="orange" x="80" y="470" rx="12" ry="12" width="285" height="48"/>
  <text class="boxTitle" x="222" y="498" text-anchor="middle">VivaReal / APTO</text>
  <text class="tiny" x="222" y="515" text-anchor="middle">web scraping</text>

  <!-- Processing -->
  <rect class="green2" x="410" y="132" rx="14" ry="14" width="260" height="72"/>
  <text class="boxTitle" x="540" y="174" text-anchor="middle">COLD pipeline</text>
  <text class="boxSub" x="540" y="193" text-anchor="middle">ingestão + refino espacial</text>

  <rect class="orange" x="410" y="330" rx="14" ry="14" width="260" height="72"/>
  <text class="boxTitle" x="540" y="372" text-anchor="middle">HOT pipeline</text>
  <text class="boxSub" x="540" y="391" text-anchor="middle">monthly UPSERT</text>

  <rect class="grey" x="410" y="258" rx="14" ry="14" width="260" height="72"/>
  <text class="boxTitle" x="540" y="300" text-anchor="middle">height model</text>
  <text class="boxSub" x="540" y="319" text-anchor="middle">LiDAR → volumetria</text>

  <!-- PostGIS -->
  <rect class="lav" x="680" y="100" rx="14" ry="14" width="240" height="56"/>
  <text class="boxTitle" x="800" y="133" text-anchor="middle" fill="#4b4aa2">cold</text>

  <rect class="lav" x="680" y="166" rx="14" ry="14" width="240" height="56"/>
  <text class="boxTitle" x="800" y="199" text-anchor="middle" fill="#4b4aa2">analytics</text>

  <rect class="lav" x="680" y="232" rx="14" ry="14" width="240" height="56"/>
  <text class="boxTitle" x="800" y="265" text-anchor="middle" fill="#4b4aa2">scratch</text>

  <rect class="lav" x="680" y="422" rx="14" ry="14" width="240" height="56"/>
  <text class="boxTitle" x="800" y="455" text-anchor="middle" fill="#4b4aa2">hot</text>
  <text class="boxSub" x="800" y="474" text-anchor="middle">market snapshots</text>

  <!-- Analysis -->
  <rect class="grey" x="960" y="148" rx="14" ry="14" width="182" height="64"/>
  <text class="boxTitle" x="1051" y="185" text-anchor="middle">GeoJSON</text>

  <rect class="orange" x="985" y="356" rx="14" ry="14" width="208" height="62"/>
  <text class="boxTitle" x="1099" y="389" text-anchor="middle" fill="#b56c3f">T02</text>
  <text class="tiny" x="1099" y="408" text-anchor="middle">market analysis</text>

  <rect class="orange" x="985" y="426" rx="14" ry="14" width="208" height="62"/>
  <text class="boxTitle" x="1099" y="459" text-anchor="middle" fill="#b56c3f">T03</text>
  <text class="tiny" x="1099" y="478" text-anchor="middle">zoning engine</text>

  <rect class="orange" x="985" y="496" rx="14" ry="14" width="208" height="62"/>
  <text class="boxTitle" x="1099" y="529" text-anchor="middle" fill="#b56c3f">T04</text>
  <text class="tiny" x="1099" y="548" text-anchor="middle">product scenarios</text>

  <!-- Delivery -->
  <rect class="green2" x="1265" y="144" rx="14" ry="14" width="240" height="68"/>
  <text class="boxTitle" x="1385" y="178" text-anchor="middle">Leaflet</text>
  <text class="boxSub" x="1385" y="198" text-anchor="middle">2D viewer / client delivery</text>

  <rect class="green" x="1265" y="262" rx="14" ry="14" width="240" height="68"/>
  <text class="boxTitle" x="1385" y="296" text-anchor="middle">MapLibre</text>
  <text class="boxSub" x="1385" y="316" text-anchor="middle">3D / complement scenes</text>

  <rect class="grey" x="1265" y="406" rx="14" ry="14" width="240" height="68"/>
  <text class="boxTitle" x="1385" y="440" text-anchor="middle">dossiê</text>
  <text class="boxSub" x="1385" y="460" text-anchor="middle">client delivery</text>

  <!-- connectors: sources -> processing -->
  <path class="line" d="M 365 120 L 390 120 L 390 168 L 410 168"/>
  <path class="line" d="M 365 178 L 390 178"/>
  <path class="line" d="M 365 236 L 390 236 L 390 168 L 410 168"/>
  <path class="lineSoft" d="M 365 342 L 390 342 L 390 294 L 410 294"/>
  <path class="line" d="M 365 494 L 390 494 L 390 366 L 410 366"/>

  <!-- processing -> postgis -->
  <path class="line" d="M 670 168 L 680 168"/>
  <path class="lineSoft" d="M 670 294 L 680 294 L 680 128 L 680 128"/>
  <path class="line" d="M 670 366 L 680 366 L 680 260 L 680 260"/>
  <path class="line" d="M 670 366 L 680 366 L 680 450 L 680 450"/>

  <!-- postgis internal -->
  <path class="lineSoft" d="M 800 156 L 800 166"/>
  <path class="lineSoft" d="M 800 222 L 800 232"/>

  <!-- postgis -> analysis / delivery -->
  <path class="line" d="M 920 128 L 944 128 L 944 180 L 960 180"/>
  <path class="line" d="M 920 194 L 948 194 L 948 180 L 960 180"/>
  <path class="line" d="M 920 260 L 944 260 L 944 180 L 960 180"/>
  <path class="line" d="M 920 450 L 944 450 L 944 180 L 960 180"/>

  <path class="line" d="M 1147 387 L 1220 387 L 1220 178 L 1265 178"/>
  <path class="lineSoft" d="M 1147 457 L 1212 457 L 1212 296 L 1265 296"/>
  <path class="line" d="M 1147 527 L 1212 527 L 1212 440 L 1265 440"/>

  <!-- analysis to delivery -->
  <path class="lineSoft" d="M 1142 180 L 1218 180"/>
  <path class="lineDotted" d="M 1142 180 L 1218 296"/>

  <!-- postgis/analysis to T02-T04 -->
  <path class="lineSoft" d="M 960 180 L 960 387 L 985 387"/>
  <path class="lineSoft" d="M 960 180 L 960 457 L 985 457"/>
  <path class="lineSoft" d="M 960 180 L 960 527 L 985 527"/>

  <!-- delivery to dossiê -->
  <path class="line" d="M 1505 178 L 1515 178 L 1515 440 L 1505 440"/>
  <path class="lineSoft" d="M 1505 296 L 1515 296 L 1515 440 L 1505 440"/>

  <!-- footer note -->
  <text class="small" x="80" y="790">Data sources → processing → PostGIS → GeoJSON → Leaflet viewer → dossiê editorial → client decision</text>
  <text class="tiny" x="80" y="812">MapLibre is complementary, used for 3D / contextual scenes rather than the main 2D route.</text>
</svg>
